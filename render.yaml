services:
  # 1. Backend Web Service
  - type: web
    name: real-estate-crm-api
    env: docker
    dockerContext: ./backend
    dockerfilePath: Dockerfile
    plan: starter # Change to 'free' if preferred, but 'starter' is more reliable
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: real-estate-crm-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production

  # 2. Frontend Static Site
  - type: web
    name: real-estate-crm-dashboard
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./frontend/dist
    rootDir: ./frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: real-estate-crm-api
          property: host

databases:
  # 3. Managed PostgreSQL Database
  - name: real-estate-crm-db
    plan: starter # Change to 'free' if preferred (90 days limit)
    region: singapore # Choose your closest region
